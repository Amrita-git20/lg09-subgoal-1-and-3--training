<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f7fa;
    --bg-tertiary: #eef1f6;
    --text-primary: #1a1a1a;
    --text-secondary: #555e6e;
    --text-muted: #8a95a3;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-dark: #085041;
    --amber-light: #FAEEDA;
    --amber-dark: #633806;
    --green-light: #EAF3DE;
    --green-dark: #27500A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1e22;
      --bg-secondary: #25282e;
      --bg-tertiary: #2e3138;
      --text-primary: #f0f2f5;
      --text-secondary: #a0aab8;
      --text-muted: #636e7d;
      --border: rgba(255,255,255,0.09);
      --border-strong: rgba(255,255,255,0.16);
      --blue-light: #0d2e50;
      --blue-dark: #85B7EB;
      --teal-light: #083d2e;
      --teal-dark: #5DCAA5;
      --amber-light: #3d2800;
      --amber-dark: #FAC775;
      --green-light: #1a2e08;
      --green-dark: #C0DD97;
      --red-light: #2e0d0d;
      --red-dark: #F09595;
    }
  }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; }
  .app { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  /* Header */
  .header { margin-bottom: 2rem; }
  .header-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
  .header-title { font-size: 26px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .header-sub { font-size: 14px; color: var(--text-secondary); }
  /* Progress */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-track { background: var(--bg-tertiary); border-radius: 99px; height: 5px; }
  .progress-fill { height: 5px; border-radius: 99px; background: var(--blue); transition: width 0.4s ease; }
  /* Nav */
  .nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .nav-btn { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border-strong); background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .nav-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .nav-btn.done { background: var(--green-light); color: var(--green-dark); border-color: transparent; }
  /* Cards */
  .card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .card-blue { border-left: 3px solid var(--blue); border-radius: 0 var(--radius) var(--radius) 0; }
  .card-teal { border-left: 3px solid var(--teal); border-radius: 0 var(--radius) var(--radius) 0; }
  .card-warn { border-color: #E24B4A; }
  /* Badges */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.03em; }
  .badge-blue { background: var(--blue-light); color: var(--blue-dark); }
  .badge-teal { background: var(--teal-light); color: var(--teal-dark); }
  .badge-amber { background: var(--amber-light); color: var(--amber-dark); }
  .badge-green { background: var(--green-light); color: var(--green-dark); }
  /* Typography */
  h2 { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
  h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
  p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 0.75rem; }
  p:last-child { margin-bottom: 0; }
  /* Metrics */
  .metric-grid { display: grid; gap: 10px; margin: 1rem 0; }
  .metric-grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .metric-grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .metric-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .metric-val { font-size: 22px; font-weight: 600; color: var(--text-primary); }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .metric-val-blue { color: var(--blue); }
  .metric-val-teal { color: var(--teal); }
  /* Sub-goal cards */
  .sg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .sg-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px 12px; }
  .sg-card-blue { border-left: 3px solid var(--blue); }
  .sg-card-teal { border-left: 3px solid var(--teal); }
  .sg-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 6px 0 3px; }
  .sg-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  /* Team rows */
  .team-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .team-row:last-child { border-bottom: none; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .av-blue { background: var(--blue-light); color: var(--blue-dark); }
  .av-teal { background: var(--teal-light); color: var(--teal-dark); }
  .team-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .team-role { font-size: 12px; color: var(--text-muted); }
  /* Workstream bars */
  .ws-bar { border-left: 3px solid var(--blue); padding: 8px 12px; background: var(--bg-secondary); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-bottom: 8px; }
  .ws-bar-teal { border-left-color: var(--teal); }
  .ws-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .ws-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  /* Tension grid */
  .tension-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin: 10px 0; }
  .tension-cell { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px 12px; }
  .tension-hdr { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
  .tension-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
  /* List items */
  .list-item { display: flex; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 7px; align-items: flex-start; line-height: 1.6; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-top: 7px; flex-shrink: 0; }
  .dot-teal { background: var(--teal); }
  .dot-red { background: #E24B4A; }
  /* Contributing */
  .contrib-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .contrib-row:last-child { border-bottom: none; }
  .contrib-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: var(--blue-light); color: var(--blue-dark); flex-shrink: 0; }
  /* Quiz */
  .quiz-wrap { margin-top: 1.25rem; }
  .quiz-q { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.75rem; line-height: 1.5; }
  .quiz-opts { display: flex; flex-direction: column; gap: 6px; }
  .quiz-opt { font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.5; width: 100%; }
  .quiz-opt:hover:not(:disabled) { background: var(--bg-secondary); }
  .quiz-opt.correct { background: var(--green-light); border-color: var(--green-dark); color: var(--green-dark); }
  .quiz-opt.wrong { background: var(--red-light); border-color: var(--red-dark); color: var(--red-dark); }
  .quiz-feedback { margin-top: 10px; font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); line-height: 1.6; }
  .fb-correct { background: var(--green-light); color: var(--green-dark); }
  .fb-wrong { background: var(--red-light); color: var(--red-dark); }
  /* Buttons */
  .btn { font-size: 13px; padding: 8px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-dark); }
  /* Nav btns */
  .nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  /* Score */
  .score-banner { background: var(--green-light); border: 1px solid var(--green-dark); border-radius: var(--radius); padding: 1.25rem 1.5rem; text-align: center; margin-bottom: 1rem; }
  .score-banner h2 { color: var(--green-dark); }
  .score-banner p { color: var(--green-dark); }
  .big-score { font-size: 52px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
  /* Final note */
  .final-note { background: var(--blue-light); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-top: 1.25rem; }
  .final-note p { color: var(--blue-dark); margin: 0; font-size: 13px; }
  .final-note h3 { color: var(--blue-dark); margin-bottom: 6px; }
  /* Tier pills */
  .tier-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
  .tier-pill { border-radius: var(--radius-sm); padding: 8px 10px; background: var(--bg-secondary); }
  .tier-name { font-weight: 600; font-size: 13px; color: var(--text-primary); }
  .tier-val { font-size: 15px; color: var(--text-secondary); }
  .tier-sub { font-size: 11px; color: var(--text-muted); }
  .tier-pill-teal { background: var(--teal-light); }
  .tier-pill-teal .tier-name { color: var(--teal-dark); }
  .tier-pill-teal .tier-val { color: var(--teal); font-size: 18px; font-weight: 700; }
</style>
</head>

const quizState = {};
let current = 0;
const done = {};

function av(initials, style) {
  return `<div class="avatar av-${style}">${initials}</div>`;
}
function teamRow(initials, name, role, avStyle) {
  return `<div class="team-row">${av(initials, avStyle)}<div><div class="team-name">${name}</div><div class="team-role">${role}</div></div></div>`;
}
function wsBar(title, desc, teal = false) {
  return `<div class="ws-bar${teal?' ws-bar-teal':''}"><div class="ws-title">${title}</div><div class="ws-desc">${desc}</div></div>`;
}
function listItem(text, color='blue') {
  return `<div class="list-item"><div class="dot dot-${color}"></div>${text}</div>`;
}

function renderQuiz(id, question, options, correctIdx, explanation) {
  if (!quizState[id]) quizState[id] = { answered: false, correct: false, chosen: -1 };
  const state = quizState[id];
  const optsHtml = options.map((o, i) => {
    let cls = 'quiz-opt';
    if (state.answered) {
      if (i === correctIdx) cls += ' correct';
      else if (i === state.chosen) cls += ' wrong';
    }
    const esc = explanation.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<button class="${cls}" onclick="answerQuiz('${id}',${i},${correctIdx},'${esc}',${options.length})" ${state.answered?'disabled':''}>${o}</button>`;
  }).join('');
  const fb = state.answered ? `<div class="quiz-feedback ${state.correct?'fb-correct':'fb-wrong'}">${state.correct?'✓ Correct. ':'✗ Not quite. '}${explanation}</div>` : '';
  return `<div class="quiz-wrap"><div class="quiz-q">${question}</div><div class="quiz-opts" id="opts-${id}">${optsHtml}</div>${fb}</div>`;
}

function answerQuiz(id, chosen, correct, explanation, total) {
  if (quizState[id] && quizState[id].answered) return;
  quizState[id] = { answered: true, correct: chosen === correct, chosen };
  renderCurrent();
}

function renderNav() {
  document.getElementById('nav').innerHTML = sections.map((s, i) => {
    let cls = 'nav-btn';
    if (i === current) cls += ' active';
    else if (done[i]) cls += ' done';
    return `<button class="${cls}" onclick="goTo(${i})">${s.label}</button>`;
  }).join('');
}

function renderCurrent() {
  document.getElementById('content').innerHTML = contentMap[sections[current].id]();
  const pct = Math.round(((current + 1) / sections.length) * 100);
  document.getElementById('prog-label').textContent = `Module ${current + 1} of ${sections.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('btn-back').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === sections.length - 1 ? 'Finish' : 'Next module →';
  renderNav();
  window.scrollTo(0, 0);
}

function goTo(idx) {
  done[current] = true;
  current = idx;
  renderCurrent();
}
function goNext() {
  if (current < sections.length - 1) goTo(current + 1);
}
function goPrev() {
  if (current > 0) goTo(current - 1);
}

renderCurrent();
</script>
